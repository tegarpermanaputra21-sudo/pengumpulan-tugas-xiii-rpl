<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alert & Console Log</title>
  </head>
  <body>
    <h1>Belajar JavaScript Dasar</h1>

    <button onclick="tampilkanPesan()">Klik Saya</button>

    <script>
      // Menampilkan pesan di Console
      console.log("Website berhasil dimuat!");

      // Fungsi untuk menampilkan popup alert
      function tampilkanPesan() {
        alert("Halo! Selamat datang di website ini.");
      }
    </script>
  </body>
</html>
