<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Card</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #9e9696;
        font-family: Arial, sans-serif;
      }

      .card {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 250px;
        height: 400px;
        padding: 20px;
        margin: 20px;
        border: 2px solid #333;
        border-radius: 10px;
        background-color: white;
        text-align: center;
        font-size: 24px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="card">CARD</div>
  </body>
</html>
