<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background-color: #f4f4f4;
      }

      /* Navbar */
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #333;
        padding: 15px 40px;
      }

      nav h2 {
        color: white;
      }

      nav ul {
        display: flex;
        list-style: none;
        gap: 20px;
      }

      nav ul li a {
        text-decoration: none;
        color: white;
      }

      /* Hero */
      .hero {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        height: 300px;
        background-color: #555;
        color: white;
        padding: 20px;
      }

      .hero h1 {
        font-size: 40px;
        margin-bottom: 15px;
      }

      .hero p {
        margin-bottom: 20px;
      }

      .hero button {
        padding: 12px 25px;
        border: none;
        border-radius: 5px;
        background-color: white;
        border: 1.5px solid white;
        color: #333;
        cursor: pointer;
        transition: all 0.1s ease;
      }
      .hero button:hover {
        background-color: transparent;
        color: white;
        border: 1.5px solid white;
      }

      /* Card Feature */
      .features {
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 40px;
        flex-wrap: wrap;
      }

      .card {
        width: 250px;
        background: white;
        border: 1px solid #ccc;
        border-radius: 10px;
        padding: 20px;
        text-align: center;
      }

      .card h3 {
        margin-bottom: 10px;
      }

      .card p {
        color: #555;
      }

      /* Footer */
      footer {
        background-color: #333;
        color: white;
        text-align: center;
        padding: 20px;
        margin-top: 20px;
      }

      /* Responsive */
      @media (max-width: 768px) {
        nav {
          flex-direction: column;
          gap: 15px;
        }

        nav ul {
          flex-direction: column;
          align-items: center;
        }

        .hero {
          height: auto;
          padding: 50px 20px;
        }

        .hero h1 {
          font-size: 30px;
        }

        .features {
          flex-direction: column;
          align-items: center;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav>
      <h2>MyWebsite</h2>

      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Feature</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

    <!-- Hero -->
    <section class="hero">
      <h1>Selamat Datang</h1>
      <p>Belajar membuat Landing Page menggunakan HTML dan CSS.</p>
      <button>Mulai Sekarang</button>
    </section>

    <!-- Card Feature -->
    <section class="features">
      <div class="card">
        <h3>HTML</h3>
        <p>Membuat struktur halaman website.</p>
      </div>

      <div class="card">
        <h3>CSS</h3>
        <p>Mempercantik tampilan website.</p>
      </div>

      <div class="card">
        <h3>Responsive</h3>
        <p>Tampilan tetap rapi di desktop maupun HP.</p>
      </div>
    </section>

    <!-- Footer -->
    <footer>
      <p>&copy; 2026 MyWebsite. All Rights Reserved.</p>
    </footer>
  </body>
</html>
