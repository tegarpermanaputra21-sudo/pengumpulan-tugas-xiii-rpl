<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar Modern</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background-color: #f4f4f4;
      }

      /* Navbar */
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #222;
        padding: 15px 40px;
      }

      nav h2 {
        color: white;
      }

      nav ul {
        display: flex;
        list-style: none;
        gap: 25px;
      }

      nav ul li a {
        color: white;
        text-decoration: none;
        padding: 8px 12px;
        transition: 0.3s;
      }

      /* Hover Effect */
      nav ul li a:hover {
        background-color: white;
        color: #222;
        border-radius: 5px;
      }

      /* Tombol Modern */
      .btn {
        background-color: #ffffff;
        color: #222;
        border: none;
        padding: 10px 20px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 15px;
        transition: 0.3s;
      }

      .btn:hover {
        background-color: #555;
        color: white;
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav>
      <h2>My Website</h2>

      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Service</a></li>
        <li><a href="#">Contact</a></li>
      </ul>

      <button class="btn">Login</button>
    </nav>
  </body>
</html>
