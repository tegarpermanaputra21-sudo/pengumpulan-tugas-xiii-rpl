<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belajar CSS Dasar</title>

    <style>
      /* Mengatur tampilan body */
      body {
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;
      }

      /* Mengatur warna, ukuran, dan posisi judul */
      h1 {
        color: blue;
        font-size: 36px;
        text-align: center;
      }

      /* Mengatur tampilan paragraf */
      p {
        color: #333333;
        font-size: 18px;
        text-align: justify;
      }

      /* Mengatur warna dan ukuran subjudul */
      h2 {
        color: green;
        font-size: 28px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <!-- Judul -->
    <h1>Website Belajar HTML & CSS</h1>

    <!-- Subjudul -->
    <h2>Materi CSS Dasar</h2>

    <!-- Paragraf -->
    <p>
      CSS digunakan untuk mempercantik tampilan website, seperti mengubah warna,
      jenis font, ukuran teks, dan posisi teks.
    </p>
  </body>
</html>
